<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>地図記号クイズ</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;background:#fff;color:#222}
.app{max-width:760px;margin:auto;padding:16px}
h1{font-size:24px;text-align:center;margin:8px 0 12px}
.score{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.score div{background:#f3f6fb;border:1px solid #d7deea;border-radius:14px;padding:10px;text-align:center;font-weight:800}
.bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
button{border:0;border-radius:14px;padding:14px 10px;font-size:17px;font-weight:800;background:#eef3ff;color:#1d3b7a}
button:active{transform:scale(.98)}
button.active{background:#2563eb;color:white}
.sub button{background:#f5f5f5;color:#333;font-size:15px}
.card{border:1px solid #d7deea;border-radius:20px;padding:18px;background:white;box-shadow:0 4px 12px rgba(0,0,0,.06);margin-top:12px}
.qtitle{font-size:19px;font-weight:900;text-align:center;margin-bottom:12px}
.symbolBox{height:165px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.symbol{width:135px;height:135px;object-fit:contain}
.nameQ{font-size:34px;font-weight:900;text-align:center;margin:46px 0}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choice{min-height:80px;background:white;color:#222;border:2px solid #d7deea;display:flex;align-items:center;justify-content:center;text-align:center}
.choice img{width:78px;height:78px;object-fit:contain}
.correct{border-color:#21a366!important;background:#e9f8ef!important}
.wrong{border-color:#d83b01!important;background:#fff0eb!important}
.result{display:none;margin-top:14px;border-radius:16px;padding:14px}
.result.show{display:block}
.result.ok{background:#e9f8ef;border:2px solid #21a366}
.result.ng{background:#fff0eb;border:2px solid #d83b01}
.result h2{font-size:21px;margin:0 0 8px}
.mini{width:74px;height:74px;object-fit:contain;vertical-align:middle;background:white;border-radius:8px}
.next{width:100%;margin-top:12px;background:#2563eb;color:white}
.empty{text-align:center;padding:22px;background:#fff8dc;border:1px solid #eadb92;border-radius:16px}
.note{text-align:center;font-size:13px;color:#667;margin-top:8px}
@media(max-width:430px){.choices{grid-template-columns:1fr}.symbol{width:125px;height:125px}}
</style>
</head>
<body>
<div class="app">
<h1>地図記号クイズ</h1>
<div class="score"><div>正解：<span id="ok">0</span></div><div>間違い：<span id="ng">0</span></div></div>
<div class="bar"><button id="s2n" class="active">記号 → 名前</button><button id="n2s">名前 → 記号</button></div>
<div class="bar sub"><button id="all">全問題</button><button id="review">間違いだけ復習</button></div>
<div class="card">
  <div id="quiz"></div>
  <div id="result" class="result"></div>
  <button id="next" class="next" style="display:none">次の問題</button>
</div>
<div class="note">記号画像は添付教材画像から切り出した画像ベースです。</div>
</div>

let mode="s2n", reviewOnly=false, current=null, choices=[], answered=false;
let ok=0, ng=0, mistakes=new Set();
const quiz=document.getElementById("quiz"), result=document.getElementById("result"), next=document.getElementById("next");
document.getElementById("s2n").onclick=()=>setMode("s2n");
document.getElementById("n2s").onclick=()=>setMode("n2s");
document.getElementById("all").onclick=()=>{reviewOnly=false; newQ();};
document.getElementById("review").onclick=()=>{reviewOnly=true; newQ();};
next.onclick=newQ;
function setMode(m){mode=m;document.getElementById("s2n").classList.toggle("active",m==="s2n");document.getElementById("n2s").classList.toggle("active",m==="n2s");newQ();}
function img(item,cls="symbol"){return `<img class="${cls}" src="${item.img}" alt="${item.name}">`;}
function pool(){return reviewOnly ? ITEMS.filter(x=>mistakes.has(x.name)) : ITEMS;}
function shuffle(a){return a.slice().sort(()=>Math.random()-0.5);}
function newQ(){
 answered=false; result.className="result"; result.innerHTML=""; next.style.display="none";
 const p=pool();
 if(!p.length){quiz.innerHTML='<div class="empty">復習する問題はまだありません。<br>まず全問題で間違えた問題をためよう。</div>';return;}
 current=p[Math.floor(Math.random()*p.length)];
 choices=shuffle([current,...shuffle(ITEMS.filter(x=>x.name!==current.name)).slice(0,3)]);
 if(mode==="s2n"){
   quiz.innerHTML=`<div class="qtitle">この記号の名前は？</div><div class="symbolBox">${img(current)}</div><div class="choices">${choices.map(c=>`<button class="choice" data-name="${c.name}">${c.name}</button>`).join("")}</div>`;
 }else{
   quiz.innerHTML=`<div class="qtitle">「${current.name}」の記号は？</div><div class="choices">${choices.map(c=>`<button class="choice" data-name="${c.name}">${img(c)}</button>`).join("")}</div>`;
 }
 document.querySelectorAll(".choice").forEach(b=>b.onclick=()=>answer(b.dataset.name,b));
}
function answer(name,btn){
 if(answered)return; answered=true;
 const right=name===current.name;
 document.querySelectorAll(".choice").forEach(b=>{if(b.dataset.name===current.name)b.classList.add("correct");});
 if(right){
   ok++; mistakes.delete(current.name);
   result.className="result ok show";
   result.innerHTML=`<h2>正解！</h2><p><b>${current.name}</b></p><p>${current.note}</p>`;
 }else{
   ng++; mistakes.add(current.name); btn.classList.add("wrong");
   result.className="result ng show";
   result.innerHTML=`<h2>不正解</h2><p>選んだ答え：<b>${name}</b></p><p>正しい答え：<b>${current.name}</b></p><p>正しい記号：${img(current,"mini")}</p><p>${current.note}</p>`;
 }
 document.getElementById("ok").textContent=ok; document.getElementById("ng").textContent=ng; next.style.display="block";
}
newQ();
</script>
