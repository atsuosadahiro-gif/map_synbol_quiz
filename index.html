<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>地図記号クイズ v7</title>
  <style>
    :root{
      --bg:#f6f8fb; --card:#fff; --ink:#1f2937; --muted:#64748b;
      --blue:#2563eb; --ok:#15803d; --ng:#dc2626;
      --okbg:#eafaf0; --ngbg:#fff1f2; --line:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink)}
    .top{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;padding:18px 20px;font-weight:900;font-size:24px;letter-spacing:.02em}
    .wrap{max-width:760px;margin:0 auto;padding:18px}
    .card{background:var(--card);border-radius:22px;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.08)}
    .mode{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
    button{border:0;border-radius:14px;padding:12px 14px;font-size:15px;font-weight:800;cursor:pointer;background:#eef0f4;color:var(--ink)}
    button.primary{background:var(--blue);color:#fff}
    button:disabled{opacity:.55;cursor:not-allowed}
    .status{display:flex;justify-content:space-between;align-items:center;margin:8px 0 12px;font-weight:800}
    .progress{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-bottom:20px}
    .bar{height:100%;width:0%;background:var(--blue);transition:.25s}
    .questionBox{border:1px solid var(--line);border-radius:20px;padding:22px 18px;text-align:center;background:white}
    .prompt{font-weight:900;font-size:19px;margin-bottom:18px}
    .symbolBig{width:128px;height:128px;margin:0 auto 22px;display:flex;align-items:center;justify-content:center}
    .nameBig{font-size:34px;font-weight:900;min-height:100px;display:flex;align-items:center;justify-content:center}
    .choices{display:grid;grid-template-columns:1fr;gap:10px;margin-top:16px}
    .choice{min-height:64px;background:#fff;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;gap:12px}
    .choice .mini{width:44px;height:44px;display:inline-flex}
    .choice.good{background:var(--okbg);border-color:#22c55e;color:#166534}
    .choice.bad{background:var(--ngbg);border-color:#fb7185;color:#991b1b}
    .result{display:none;margin-top:16px;padding:16px;border-radius:16px;font-weight:800;line-height:1.6}
    .result.show{display:block}
    .result.ok{background:var(--okbg);border:2px solid #22c55e;color:#14532d}
    .result.ng{background:var(--ngbg);border:2px solid #fb7185;color:#7f1d1d}
    .answerTitle{font-size:22px;margin-bottom:6px}
    .origin{font-size:15px}
    .footer{display:flex;gap:10px;justify-content:space-between;margin-top:18px}
    .footer button{flex:1}
    .svgSymbol{width:100%;height:100%}
    .svgSymbol *{vector-effect:non-scaling-stroke}
    @media(min-width:560px){.choices{grid-template-columns:1fr 1fr}.wrap{padding:22px}.top{border-radius:0 0 18px 18px}}
  </style>
</head>
<body>
  <div class="top">🗺️ 地図記号クイズ</div>
  <div class="wrap">
    <div class="card">
      <div class="mode">
        <button id="symbolToName" class="primary">記号→名前</button>
        <button id="nameToSymbol">名前→記号</button>
        <button id="wrongOnly">間違えた問題</button>
        <button id="reset">リセット</button>
      </div>

      <div class="status">
        <div id="qcount">問 1 / 26</div>
        <div>正解 <span id="okCount" style="color:#2563eb">0</span>　間違え <span id="ngCount" style="color:#dc2626">0</span></div>
      </div>
      <div class="progress"><div class="bar" id="bar"></div></div>

      <div class="questionBox">
        <div class="prompt" id="prompt">これは何？</div>
        <div id="main"></div>
        <div class="choices" id="choices"></div>
      </div>

      <div class="result" id="result"></div>

      <div class="footer">
        <button id="prev">← 前の問題</button>
        <button id="next" class="primary" disabled>次の問題 →</button>
      </div>
    </div>
  </div>

<script>
const data = [
  {id:"city", name:"市役所", origin:"市の中心になる役所なので、中心を表す二重丸で覚える。"},
  {id:"town", name:"町・村役場", origin:"市役所より小さい役場なので、丸だけで覚える。"},
  {id:"school", name:"小・中学校", origin:"学校で学ぶ『文』の字からできた記号。"},
  {id:"highschool", name:"高等学校", origin:"小・中学校と区別するため、丸の中に×で表す。"},
  {id:"police", name:"警察署", origin:"交番の×に丸をつけ、大きい警察の施設であることを表す。"},
  {id:"koban", name:"交番", origin:"町の中にある小さな警察の場所を、シンプルな×で表す。"},
  {id:"post", name:"郵便局", origin:"郵便番号でも使う〒の形。"},
  {id:"fire", name:"消防署", origin:"消防で使う道具をもとにした形として覚える。"},
  {id:"hospital", name:"病院", origin:"医療を表す十字マークからできた記号。"},
  {id:"health", name:"保健所", origin:"病院の十字に丸を加えた形で、保健の施設を表す。"},
  {id:"factory", name:"工場", origin:"歯車のような形で、ものを作る場所を表す。"},
  {id:"power", name:"発電所・変電所", origin:"工場に近い形に線を加え、電気の施設を表す。"},
  {id:"lighthouse", name:"灯台", origin:"光を出す塔の形をもとにしている。"},
  {id:"shrine", name:"神社", origin:"神社の入口にある鳥居の形。"},
  {id:"temple", name:"寺院", origin:"お寺で使われる卍の形を表す。"},
  {id:"castle", name:"城あと", origin:"城の石垣や門の跡を表す形。"},
  {id:"airport", name:"空港", origin:"飛行機が発着する場所なので飛行機の形。"},
  {id:"port", name:"港", origin:"船をとめる碇（いかり）の形。"},
  {id:"road", name:"道路", origin:"道路を上から見た線で表す。"},
  {id:"bridge", name:"橋", origin:"川などをまたぐ部分を、道路の途中の変化で表す。"},
  {id:"jr", name:"鉄道（JR）", origin:"線路を四角い形で表す。"},
  {id:"rice", name:"田（水田）", origin:"田んぼの区画と水のある様子を表す。"},
  {id:"field", name:"畑", origin:"作物を植える畝が並ぶ様子。"},
  {id:"orchard", name:"果樹園", origin:"木に丸い実がなっているイメージ。"},
  {id:"tea", name:"茶畑", origin:"茶の木が規則的に並んでいる様子。"},
  {id:"spring", name:"温泉", origin:"湯気が上がっている形。"}
];

function svg(id, cls="svgSymbol"){
  const common = `class="${cls}" viewBox="0 0 100 100" aria-hidden="true"`;
  const stroke = `stroke="black" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"`;
  const fill = `fill="black"`;
  const m = {
    city:`<svg ${common}><circle cx="50" cy="50" r="31" ${stroke}/><circle cx="50" cy="50" r="17" ${stroke}/></svg>`,
    town:`<svg ${common}><circle cx="50" cy="50" r="28" ${stroke}/></svg>`,
    school:`<svg ${common}><text x="50" y="68" text-anchor="middle" font-size="58" font-weight="900" font-family="serif">文</text></svg>`,
    highschool:`<svg ${common}><circle cx="50" cy="50" r="32" ${stroke}/><line x1="30" y1="30" x2="70" y2="70" ${stroke}/><line x1="70" y1="30" x2="30" y2="70" ${stroke}/></svg>`,
    police:`<svg ${common}><circle cx="50" cy="50" r="32" ${stroke}/><line x1="30" y1="30" x2="70" y2="70" ${stroke}/><line x1="70" y1="30" x2="30" y2="70" ${stroke}/></svg>`,
    koban:`<svg ${common}><line x1="25" y1="25" x2="75" y2="75" ${stroke}/><line x1="75" y1="25" x2="25" y2="75" ${stroke}/></svg>`,
    post:`<svg ${common}><line x1="25" y1="28" x2="75" y2="28" ${stroke}/><line x1="50" y1="28" x2="50" y2="82" ${stroke}/><path d="M28 48 H72" ${stroke}/><path d="M32 48 C36 72,64 72,68 48" ${stroke}/></svg>`,
    fire:`<svg ${common}><path d="M50 18 V82" ${stroke}/><path d="M28 42 C36 36,44 36,50 42 C56 48,64 48,72 42" ${stroke}/></svg>`,
    hospital:`<svg ${common}><path d="M50 18 V82" ${stroke}/><path d="M18 50 H82" ${stroke}/><path d="M25 20 H75 V80 H25 Z" stroke="black" stroke-width="5" fill="none"/></svg>`,
    health:`<svg ${common}><circle cx="50" cy="50" r="32" ${stroke}/><line x1="50" y1="28" x2="50" y2="72" ${stroke}/><line x1="28" y1="50" x2="72" y2="50" ${stroke}/></svg>`,
    factory:`<svg ${common}><circle cx="50" cy="50" r="18" ${stroke}/><g ${stroke}><line x1="50" y1="12" x2="50" y2="25"/><line x1="50" y1="75" x2="50" y2="88"/><line x1="12" y1="50" x2="25" y2="50"/><line x1="75" y1="50" x2="88" y2="50"/><line x1="23" y1="23" x2="32" y2="32"/><line x1="77" y1="23" x2="68" y2="32"/><line x1="23" y1="77" x2="32" y2="68"/><line x1="77" y1="77" x2="68" y2="68"/></g></svg>`,
    power:`<svg ${common}><circle cx="45" cy="50" r="18" ${stroke}/><path d="M63 25 V75 H78" ${stroke}/><g ${stroke}><line x1="45" y1="12" x2="45" y2="24"/><line x1="45" y1="76" x2="45" y2="88"/><line x1="8" y1="50" x2="22" y2="50"/></g></svg>`,
    lighthouse:`<svg ${common}><circle cx="50" cy="48" r="16" ${stroke}/><path d="M38 78 H62 L56 60 H44 Z" fill="black"/><g ${stroke}><line x1="50" y1="10" x2="50" y2="25"/><line x1="22" y1="26" x2="34" y2="35"/><line x1="78" y1="26" x2="66" y2="35"/></g></svg>`,
    shrine:`<svg ${common}><path d="M22 24 H78" ${stroke}/><path d="M30 38 H70" ${stroke}/><path d="M38 38 V82" ${stroke}/><path d="M62 38 V82" ${stroke}/></svg>`,
    temple:`<svg ${common}><path d="M30 22 V70 H72" ${stroke}/><path d="M30 46 H64 V22" ${stroke}/><path d="M70 78 V30 H28" ${stroke}/><path d="M70 54 H36 V78" ${stroke}/></svg>`,
    castle:`<svg ${common}><path d="M25 80 V55 H38 V42 H50 V28 H62 V80" ${stroke}/><path d="M62 55 H78 V80" ${stroke}/></svg>`,
    airport:`<svg ${common}><path d="M50 12 L58 44 L84 58 L82 67 L57 60 L54 85 H46 L43 60 L18 67 L16 58 L42 44 Z" fill="black"/></svg>`,
    port:`<svg ${common}><path d="M50 15 V72" ${stroke}/><circle cx="50" cy="24" r="7" stroke="black" stroke-width="5" fill="none"/><path d="M23 55 C25 80,75 80,77 55" ${stroke}/><path d="M28 65 L15 58" ${stroke}/><path d="M72 65 L85 58" ${stroke}/></svg>`,
    road:`<svg ${common}><line x1="18" y1="40" x2="82" y2="40" ${stroke}/><line x1="18" y1="60" x2="82" y2="60" ${stroke}/></svg>`,
    bridge:`<svg ${common}><line x1="15" y1="40" x2="38" y2="40" ${stroke}/><line x1="62" y1="40" x2="85" y2="40" ${stroke}/><line x1="15" y1="60" x2="38" y2="60" ${stroke}/><line x1="62" y1="60" x2="85" y2="60" ${stroke}/><path d="M36 50 H64" ${stroke}/><path d="M42 36 L58 64" ${stroke}/></svg>`,
    jr:`<svg ${common}><rect x="22" y="35" width="56" height="30" stroke="black" stroke-width="7" fill="none"/><line x1="10" y1="50" x2="22" y2="50" ${stroke}/><line x1="78" y1="50" x2="90" y2="50" ${stroke}/></svg>`,
    rice:`<svg ${common}><g stroke="black" stroke-width="6" stroke-linecap="round"><line x1="35" y1="20" x2="35" y2="80"/><line x1="55" y1="20" x2="55" y2="80"/><line x1="72" y1="25" x2="72" y2="75"/></g></svg>`,
    field:`<svg ${common}><path d="M22 30 L35 45 L48 30" ${stroke}/><path d="M52 30 L65 45 L78 30" ${stroke}/><path d="M22 58 L35 73 L48 58" ${stroke}/><path d="M52 58 L65 73 L78 58" ${stroke}/></svg>`,
    orchard:`<svg ${common}><circle cx="34" cy="34" r="8" ${stroke}/><circle cx="66" cy="34" r="8" ${stroke}/><circle cx="34" cy="66" r="8" ${stroke}/><circle cx="66" cy="66" r="8" ${stroke}/></svg>`,
    tea:`<svg ${common}><circle cx="50" cy="25" r="4" ${fill}/><circle cx="36" cy="50" r="4" ${fill}/><circle cx="64" cy="50" r="4" ${fill}/><circle cx="22" cy="75" r="4" ${fill}/><circle cx="50" cy="75" r="4" ${fill}/><circle cx="78" cy="75" r="4" ${fill}/></svg>`,
    spring:`<svg ${common}><path d="M23 62 C28 78,72 78,77 62" ${stroke}/><path d="M36 55 C25 40,48 35,36 20" ${stroke}/><path d="M52 55 C41 40,64 35,52 20" ${stroke}/><path d="M68 55 C57 40,80 35,68 20" ${stroke}/></svg>`
  };
  return m[id] || "";
}

let mode = "symbolToName";
let currentIndex = 0;
let current = null;
let locked = false;
let ok = 0;
let ng = 0;
let answered = 0;
let wrongQuestions = [];
let wrongMode = false;
let history = [];

const els = {
  qcount:document.getElementById("qcount"), ok:document.getElementById("okCount"), ng:document.getElementById("ngCount"),
  bar:document.getElementById("bar"), prompt:document.getElementById("prompt"), main:document.getElementById("main"),
  choices:document.getElementById("choices"), result:document.getElementById("result"), next:document.getElementById("next"),
  prev:document.getElementById("prev"), symbolToName:document.getElementById("symbolToName"), nameToSymbol:document.getElementById("nameToSymbol"),
  wrongOnly:document.getElementById("wrongOnly"), reset:document.getElementById("reset")
};

function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
function source(){return wrongMode ? wrongQuestions : data}
function updateStatus(){
  const total = source().length || data.length;
  els.qcount.textContent = wrongMode && wrongQuestions.length===0 ? "問 0 / 0" : `問 ${Math.min(answered+1,total)} / ${total}`;
  els.ok.textContent = ok;
  els.ng.textContent = ng;
  els.bar.style.width = `${Math.min(100, answered / Math.max(1,total) * 100)}%`;
}
function pick(){
  const s = source();
  if(wrongMode && s.length===0) return null;
  return s[Math.floor(Math.random()*s.length)];
}
function makeChoices(answer){
  const key = mode==="symbolToName" ? "name" : "id";
  const used = new Set([answer[key]]);
  const arr = [answer];
  while(arr.length<4){
    const x = data[Math.floor(Math.random()*data.length)];
    if(!used.has(x[key])){used.add(x[key]);arr.push(x)}
  }
  return shuffle(arr);
}
function drawMain(item){
  if(mode==="symbolToName"){
    els.main.innerHTML = `<div class="symbolBig">${svg(item.id)}</div>`;
  }else{
    els.main.innerHTML = `<div class="nameBig">${item.name}</div>`;
  }
}
function newQuestion(){
  locked=false; els.next.disabled=true; els.result.className="result"; els.result.innerHTML="";
  current = pick();
  updateStatus();
  if(!current){
    els.prompt.textContent="間違えた問題はありません";
    els.main.innerHTML='<div class="nameBig">🎉</div>';
    els.choices.innerHTML="";
    return;
  }
  els.prompt.textContent = mode==="symbolToName" ? "これは何？" : "正しいものを選ぼう";
  drawMain(current);
  els.choices.innerHTML="";
  makeChoices(current).forEach(item=>{
    const b=document.createElement("button");
    b.className="choice";
    b.innerHTML = mode==="symbolToName"
      ? `<span>${item.name}</span>`
      : `<span class="mini">${svg(item.id)}</span><span>${item.name}</span>`;
    b.onclick=()=>answer(item,b);
    els.choices.appendChild(b);
  });
}
function answer(item,button){
  if(locked)return;
  locked=true; answered++;
  const correct = item.id===current.id;
  if(correct){
    ok++;
    button.classList.add("good");
    wrongQuestions = wrongQuestions.filter(q=>q.id!==current.id);
    els.result.innerHTML = `<div class="answerTitle">正解！ ${current.name}</div><div class="origin">成り立ち：${current.origin}</div>`;
    els.result.className="result show ok";
  }else{
    ng++;
    button.classList.add("bad");
    if(!wrongQuestions.find(q=>q.id===current.id)) wrongQuestions.push(current);
    [...els.choices.children].forEach(b=>{
      if((mode==="symbolToName" && b.textContent.trim()===current.name) || (mode==="nameToSymbol" && b.textContent.trim()===current.name)){
        b.classList.add("good");
      }
    });
    els.result.innerHTML = `
      <div class="answerTitle">不正解</div>
      <div>選んだ答え：<b>${item.name}</b></div>
      <div>正しい答え：<b>${current.name}</b></div>
      <div style="width:72px;height:72px;margin:8px 0">${svg(current.id)}</div>
      <div class="origin">成り立ち：${current.origin}</div>`;
    els.result.className="result show ng";
  }
  history.push(current);
  updateStatus();
  els.next.disabled=false;
}
function setMode(m){
  mode=m;
  els.symbolToName.classList.toggle("primary",m==="symbolToName");
  els.nameToSymbol.classList.toggle("primary",m==="nameToSymbol");
  newQuestion();
}
els.symbolToName.onclick=()=>setMode("symbolToName");
els.nameToSymbol.onclick=()=>setMode("nameToSymbol");
els.wrongOnly.onclick=()=>{wrongMode=!wrongMode;els.wrongOnly.classList.toggle("primary",wrongMode);newQuestion()};
els.reset.onclick=()=>{ok=0;ng=0;answered=0;wrongQuestions=[];wrongMode=false;history=[];els.wrongOnly.classList.remove("primary");newQuestion()};
els.next.onclick=newQuestion;
els.prev.onclick=()=>{ if(history.length){ current=history.pop(); drawMain(current); } };

newQuestion();
</script>
</body>
</html>
