<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>地図記号クイズ</title>
<style>
  :root{--green:#21a366;--red:#d83b01;--blue:#2563eb;--bg:#fff;--ink:#222;--soft:#f3f6fb;--line:#d7deea}
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink)}
  .app{max-width:760px;margin:0 auto;padding:16px} h1{font-size:24px;margin:8px 0 12px;text-align:center}
  .top{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.score{background:var(--soft);border:1px solid var(--line);border-radius:14px;padding:10px;text-align:center;font-weight:700}
  .modebar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}button{border:0;border-radius:14px;padding:14px 12px;font-size:17px;font-weight:700;background:#eef3ff;color:#1d3b7a;cursor:pointer}button:active{transform:scale(.98)}button.active{background:var(--blue);color:#fff}
  .subbar{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.subbar button{background:#f5f5f5;color:#333;font-size:15px}
  .card{border:1px solid var(--line);border-radius:20px;padding:18px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.06)}.qtitle{font-size:18px;font-weight:800;text-align:center;margin-bottom:12px}
  .symbolBox{height:160px;display:flex;align-items:center;justify-content:center;margin:6px auto 14px}svg.symbol{width:130px;height:130px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .choice{min-height:76px;background:#fff;color:#222;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;text-align:center;padding:8px}.choice svg{width:72px;height:72px}.choice.correct{border-color:var(--green);background:#e9f8ef}.choice.wrong{border-color:var(--red);background:#fff0eb}
  .result{margin-top:14px;border-radius:16px;padding:14px;display:none}.result.show{display:block}.result.ok{background:#e9f8ef;border:2px solid var(--green)}.result.ng{background:#fff0eb;border:2px solid var(--red)}.result h2{margin:0 0 8px;font-size:21px}.miniSymbol{width:70px;height:70px;vertical-align:middle}.next{width:100%;margin-top:12px;background:var(--blue);color:white}.empty{text-align:center;padding:22px;background:#fff8dc;border-radius:16px;border:1px solid #eadb92;margin-top:12px}.muted{color:#667;font-size:14px;text-align:center;margin-top:8px}
  @media(max-width:420px){.choices{grid-template-columns:1fr}.symbolBox{height:140px}svg.symbol{width:120px;height:120px}}
</style>
</head>
<body><div class="app"><h1>地図記号クイズ</h1><div class="top"><div class="score">正解：<span id="okCount">0</span></div><div class="score">間違い：<span id="ngCount">0</span></div></div><div class="modebar"><button id="symbolToName" class="active">記号 → 名前</button><button id="nameToSymbol">名前 → 記号</button></div><div class="subbar"><button id="allMode">全問題</button><button id="reviewMode">間違いだけ復習</button></div><div class="card"><div id="quiz"></div><div id="result" class="result"></div><button id="nextBtn" class="next" style="display:none;">次の問題</button></div><div class="muted">問題文にジャンルのヒントは出ません。</div></div>

function answer(name,btn){if(answered)return;answered=true;const isOk=name===current.name;document.querySelectorAll(".choice").forEach(b=>{if(b.dataset.name===current.name)b.classList.add("correct")});if(isOk){ok++;mistakes.delete(current.name);result.className="result ok show";result.innerHTML=`<h2>正解！</h2><p><b>${current.name}</b></p><p>${current.note}</p>`}else{ng++;mistakes.add(current.name);btn.classList.add("wrong");result.className="result ng show";result.innerHTML=`<h2>不正解</h2><p>選んだ答え：<b>${name}</b></p><p>正しい答え：<b>${current.name}</b></p><p>正しい記号：${draw(current,"miniSymbol")}</p><p>${current.note}</p>`}updateScore();nextBtn.style.display="block"}function shuffle(a){return a.slice().sort(()=>Math.random()-.5)}function draw(item,cls="symbol"){return `<img class="${cls}" src="${item.img}" alt="${item.name}">`}function svg(cls,body){return `<svg class="${cls}" viewBox="0 0 100 100" aria-hidden="true"><g fill="none" stroke="#111" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">${body}</g></svg>`}

ath d="M16 62 L41 62"/><path d="M59 62 L84 62"/><path d="M42 50 L58 50"/><path d="M36 44 L42 38"/><path d="M64 44 L58 38"/><path d="M36 56 L42 62"/><path d="M64 56 L58 62"/>`)}function jrRail(c){return svg(c,`<rect x="28" y="35" width="44" height="30"/><path d="M18 42 L28 42"/><path d="M72 42 L82 42"/><path d="M18 58 L28 58"/><path d="M72 58 L82 58"/><path d="M18 35 L18 65"/><path d="M82 35 L82 65"/>`)}function riceField(c){return svg(c,`<path d="M32 25 L32 45"/><path d="M50 20 L50 42"/><path d="M68 25 L68 45"/><path d="M38 58 L38 78"/><path d="M60 58 L60 78"/>`)}function field(c){return svg(c,`<path d="M25 30 L40 45 L55 30"/><path d="M55 30 L70 45 L85 30"/><path d="M20 58 L35 73 L50 58"/><path d="M50 58 L65 73 L80 58"/>`)}function orchard(c){return svg(c,`<circle cx="35" cy="30" r="6"/><circle cx="60" cy="30" r="6"/><circle cx="48" cy="50" r="6"/><circle cx="30" cy="70" r="6"/><circle cx="70" cy="70" r="6"/>`)}function teaField(c){return svg(c,`<circle cx="50" cy="24" r="2.5" fill="#111"/><circle cx="42" cy="38" r="2.5" fill="#111"/><circle cx="58" cy="38" r="2.5" fill="#111"/><circle cx="34" cy="54" r="2.5" fill="#111"/><circle cx="50" cy="54" r="2.5" fill="#111"/><circle cx="66" cy="54" r="2.5" fill="#111"/><circle cx="26" cy="72" r="2.5" fill="#111"/><circle cx="42" cy="72" r="2.5" fill="#111"/><circle cx="58" cy="72" r="2.5" fill="#111"/><circle cx="74" cy="72" r="2.5" fill="#111"/>`)}function conifer(c){return svg(c,`<path d="M28 72 L38 48 L48 72"/><path d="M52 72 L62 48 L72 72"/><path d="M40 42 L50 18 L60 42"/>`)}function broadleaf(c){return svg(c,`<circle cx="34" cy="36" r="8"/><circle cx="64" cy="36" r="8"/><circle cx="48" cy="62" r="8"/><path d="M34 44 L34 56"/><path d="M64 44 L64 56"/><path d="M48 70 L48 82"/>`)}function hotSpring(c){return svg(c,`<path d="M25 72 C35 86 65 86 75 72"/><path d="M30 34 C20 48 42 50 32 64"/><path d="M50 28 C40 44 62 48 50 66"/><path d="M70 34 C60 48 82 50 68 64"/>`)}newQuestion();
